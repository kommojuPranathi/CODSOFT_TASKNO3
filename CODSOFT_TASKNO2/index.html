<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>📝 To-Do List Application</h1>
            <button id="darkModeBtn">🌙 Dark Mode</button>
        </header><hr>

        <!-- Add Task -->
        <div class="task-form">

            <input type="text" id="taskInput" placeholder="Enter your task"><br>

            <select id="category"><br>
                <option value="">Category</option>
                <option>Study</option>
                <option>Work</option>
                <option>Personal</option>
                <option>Shopping</option>
            </select></br>

            <select id="priority"><br>
                <option value="">Priority</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>/<br>

            <input type="date" id="dueDate">

            <button id="addTaskBtn">Add Task</button><br>

        </div>

        <!-- Search & Filter -->
        <div class="controls">

            <input type="text" id="searchInput" placeholder="Search task...">

            <select id="filter"><br>
                <option value="all">All Tasks</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
            </select><br>

        </div>

        <!-- Task Count -->
        <div class="stats"><br>
            <p>Total : <span id="totalTasks">0</span></p>
            <p>Completed : <span id="completedTasks">0</span></p>
            <p>Pending : <span id="pendingTasks">0</span></p><br>
        </div>

        <!-- Task List -->
        <ul id="taskList"><br>

            <!-- JavaScript will add tasks here -->

        </ul>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
